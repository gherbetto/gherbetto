<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 860 500">
  <foreignObject width="100%" height="100%">
  <div xmlns="http://www.w3.org/1999/xhtml">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        text-decoration: none;
        list-style: none;
      }

      @font-face {
        font-family: 'DM Mono';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/dmmono/v16/aFTU7PB1QTsUX8KYthqQBA.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 700;
        font-stretch: 100%;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/nunitosans/v19/pe0AMImSLYBIv1o4X1M8ce2xCx3yop4tQpF_MeTm0lfUVwoNnq4CLz0_kJ3xzA.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      .body {
        background: #1D2528;
        border: 1px solid #21262d;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 40px 44px;
        position: relative;
        font-family: 'DM Mono', sans-serif;
      }

      .glow {
        position: absolute;
        top: -80px;
        right: -40px;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle,rgba(63,185,80,0.05) 0%, transparent 65%);
        pointer-events: none;
      }

      .glow2 {
        position: absolute;
        bottom: -60px;
        left: 200px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(63,185,80,0.05) 0%, transparent 65%);
        pointer-events: none;
      }

      .left { flex: 1; }

      .prompt {
        font-size: 12px;
        color: #319860;
        letter-spacing: 0.07em;
        margin-bottom: 14px;
      }

      .name {
        font-family: 'Nunito Sans', sans-serif;
        font-size: 46px;
        font-weight: 700;
        color: #fff;
        line-height: 1.05;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
      }

      .name span { color: #319860; }

      .subtitle {
        font-size: 12px;
        color: #B1B1B1;
        letter-spacing: 0.03em;
        margin-bottom: 22px;
      }

      .desc {
        font-size: 13px;
        color: #B1B1B1;
        line-height: 1.85;
        max-width: 420px;
      }

      .desc em { color: #319860; font-style: normal; }

      .right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 9px;
        flex-shrink: 0;
      }

      .pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 12px;
        color: #B1B1B1;
        white-space: nowrap;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #3fb950;
        animation: blink 2s infinite;
        flex-shrink: 0;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.25; }
      }

      .divider {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #58a6ff44, transparent);
      }
    </style>

    <div class="body">
      <div class="glow"></div>
      <div class="glow2"></div>
      <div class="divider"></div>

      <div class="left">
        <div class="prompt">// gherbetto.dev</div>
        <div class="name">Dmitrii<br/><span>Gherastovschi</span></div>
        <div class="subtitle">frontend developer · remote · 5+ years exp.</div>
        <div class="desc">
          i build things for browsers &#8212; clean markup,<br/>
          semantic HTML, and CSS that doesn&#39;t fight you.<br/>
          focused on <em>vanilla foundations</em> with a growing<br/>
          eye for design systems and modern tooling.
        </div>
      </div>

      <div class="right">
        <div class="pill"><div class="dot"></div> open to work</div>
        <div class="pill">&#128205; Moldova, MD</div>
        <div class="pill">&#9749; VS Code + coffee</div>
        <div class="pill">&#128247; amateur photographer</div>
        <div class="pill">&#127918; Pok&#233;mon fan</div>
      </div>
    </div>

  </div>
  </foreignObject>
</svg>
