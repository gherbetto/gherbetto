<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 400 auto" width="400" height="auto">
  <foreignObject width="100%" height="100%">
  <div xmlns="http://www.w3.org/1999/xhtml">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        text-decoration: none;
        list-style: none;
      }

      .body {
        max-width: 400px;
        height: auto;
        background: #0d1117;
        border: 1px solid #21262d;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 28px 28px 24px;
        position: relative;
        font-family: 'Courier New', monospace;
      }

      .glow {
        position: absolute;
        top: -60px;
        right: -60px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(88,166,255,0.09) 0%, transparent 65%);
        pointer-events: none;
      }

      .glow2 {
        position: absolute;
        bottom: -40px;
        left: -20px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(63,185,80,0.05) 0%, transparent 65%);
        pointer-events: none;
      }

      .top {}

      .prompt {
        font-size: 10px;
        color: #58a6ff;
        letter-spacing: 0.07em;
        margin-bottom: 10px;
      }

      .name {
        font-family: 'Arial Black', sans-serif;
        font-size: 34px;
        font-weight: 800;
        color: #e6edf3;
        line-height: 1.05;
        margin-bottom: 5px;
        letter-spacing: -0.5px;
      }

      .name span { color: #58a6ff; }

      .subtitle {
        font-size: 10px;
        color: #8b949e;
        letter-spacing: 0.03em;
        margin-bottom: 14px;
      }

      .desc {
        font-size: 11px;
        color: #c9d1d9;
        line-height: 1.8;
      }

      .desc em { color: #58a6ff; font-style: normal; }

      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 18px;
      }

      .pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 20px;
        padding: 5px 11px;
        font-size: 10px;
        color: #8b949e;
        white-space: nowrap;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #3fb950;
        animation: blink 2s infinite;
        flex-shrink: 0;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.25; }
      }

      .divider {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #58a6ff44, transparent);
      }
    </style>

    <div class="body">
      <div class="glow"></div>
      <div class="glow2"></div>
      <div class="divider"></div>

      <div class="top">
        <div class="prompt">// gherbetto · github profile</div>
        <div class="name">Dmitrii<br/><span>Gherastovschi</span></div>
        <div class="subtitle">frontend developer · moldova · he/him</div>
        <div class="desc">
          i build things for browsers &#8212; clean markup,<br/>
          semantic HTML, and CSS that doesn&#39;t fight you.<br/>
          focused on <em>vanilla foundations</em> with a growing<br/>
          eye for design systems and modern tooling.
        </div>
      </div>

      <div class="pills">
        <div class="pill"><div class="dot"></div> open to work</div>
        <div class="pill">&#128205; Moldova, MD</div>
        <div class="pill">&#9749; VS Code + coffee</div>
        <div class="pill">&#128247; photographer</div>
        <div class="pill">&#127918; Pok&#233;mon fan</div>
      </div>
    </div>

  </div>
  </foreignObject>
</svg>
